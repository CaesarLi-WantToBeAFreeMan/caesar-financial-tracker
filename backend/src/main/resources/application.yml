spring:
    profiles:
        active: local
    jackson:
        property-naming-strategy: SNAKE_CASE
    datasource:
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: ${SPRING_DATASOURCE_URL}
        username: ${SPRING_DATASOURCE_USERNAME}
        password: ${SPRING_DATASOURCE_PASSWORD}
    jpa:
        hibernate:
            ddl-auto: ${DDL_AUTO:update} #auto generate SQL statements
        properties:
            hibernate:
                format_sql: true #format SQL statements
        show-sql: ${SHOW_SQL:false}

server:
    port: ${PORT:1989} #memorize Tiananmen Square protests that happened in June 4, 1989
    servlet:
        context-path: /api/alpha #API path for version alpha

app:
    cors:
        allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000} #24 hours
